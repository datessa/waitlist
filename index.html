<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Datessa — From access to understanding</title>
<meta name="description" content="Your AI can reach your tools. Datessa helps it understand them. Join the waitlist." />
<meta property="og:title" content="Datessa — From access to understanding" />
<meta property="og:description" content="Your AI can reach your tools. Datessa helps it understand them." />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#070708" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23070708'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='22' font-weight='bold' fill='%23F4F4F5' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E" />
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.97/build/spline-viewer.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#F4F4F5; --muted:rgba(244,244,245,.55); --bg:#070708;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:"Inter",-apple-system,"Helvetica Neue",Arial,sans-serif;color:var(--ink);
    -webkit-font-smoothing:antialiased}

  /* background scene — overscanned so the canvas-painted badge sits past the viewport edge */
  #scene{position:fixed;left:0;right:0;top:-7vh;bottom:-7vh;z-index:0;overflow:hidden}
  #scene spline-viewer{width:107%;height:100%;display:block;transform:translateX(-3.5%)}

  /* legibility scrim */
  .scrim{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(90deg,rgba(7,7,8,.72) 0%,rgba(7,7,8,.4) 34%,rgba(7,7,8,0) 66%)}

  /* fixed chrome */
  .chrome{position:fixed;inset:0 0 auto 0;z-index:3;display:flex;align-items:center;justify-content:space-between;
    padding:30px clamp(24px,5vw,56px);pointer-events:none}
  .chrome .logo{font-weight:600;font-size:1.37rem;letter-spacing:-.02em;color:var(--ink);text-decoration:none;pointer-events:auto}

  /* hero content (left, vertically centered) */
  .hero{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;
    padding:0 clamp(24px,5vw,56px);pointer-events:none;
    opacity:0;transform:translateY(12px);transition:opacity 1s ease .15s,transform 1s ease .15s}
  .ready .hero{opacity:1;transform:none}
  .chrome{opacity:0;transition:opacity 1s ease .15s}
  .ready .chrome{opacity:1}
  .hero h1{margin:0;line-height:1.05;max-width:16ch;text-wrap:balance;
    font-weight:600;font-size:clamp(2.6rem,6.2vw,5rem);letter-spacing:-.04em}
  .hero h2{font-weight:400;line-height:1.5;margin:24px 0 0;
    font-size:clamp(1.02rem,1.5vw,1.25rem);color:var(--muted);max-width:38ch}
  .hero .cta{margin-top:40px;display:inline-flex;align-items:center;gap:9px;align-self:flex-start;
    pointer-events:auto;cursor:pointer;text-decoration:none;
    font-weight:500;font-size:.98rem;color:var(--bg);background:var(--ink);
    min-height:50px;padding:0 26px;border-radius:8px;border:0;
    transition:opacity .2s ease,transform .2s ease}
  .hero .cta:hover{opacity:.88;transform:translateY(-1px)}
  .hero .cta[hidden]{display:none}

  /* inline waitlist form */
  .wl{margin-top:40px;align-self:flex-start;pointer-events:auto;width:min(420px,86vw)}
  .wl[hidden]{display:none}
  .wl form{display:flex;align-items:center;gap:8px;
    background:rgba(244,244,245,.06);border:1px solid rgba(244,244,245,.16);border-radius:10px;
    padding:5px 5px 5px 16px;transition:border-color .2s ease,background .2s ease}
  .wl form:focus-within{border-color:rgba(244,244,245,.5);background:rgba(244,244,245,.09)}
  .wl input{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--ink);
    font-family:inherit;font-size:1rem;min-height:44px}
  .wl input::placeholder{color:rgba(244,244,245,.4)}
  .wl button{flex:none;border:0;cursor:pointer;color:var(--bg);background:var(--ink);
    min-height:42px;padding:0 20px;border-radius:7px;font-family:inherit;font-weight:500;font-size:.92rem;
    transition:opacity .2s ease}
  .wl button:hover{opacity:.85}
  .wl .err{margin:10px 2px 0;font-size:.8rem;color:#F4837A;min-height:1em}
  .wl .err[hidden]{display:none}
  .wl-done{margin-top:40px;align-self:flex-start;pointer-events:auto}
  .wl-done[hidden]{display:none}
  .wl-done .t{font-weight:600;font-size:1.15rem}
  .wl-done .s{margin-top:8px;font-size:.95rem;color:var(--muted)}

  @media (prefers-reduced-motion: reduce){
    .hero,.chrome{opacity:1;transform:none;transition:none}
  }
  @media(max-width:640px){
    .scrim{background:linear-gradient(180deg,rgba(7,7,8,.7),rgba(7,7,8,.3) 40%,rgba(7,7,8,.6))}
  }
</style>
</head>
<body>

  <div id="scene">
    <spline-viewer url="https://prod.spline.design/D-dbb5pVvaqZ5UXt/scene.splinecode"></spline-viewer>
  </div>
  <script>
    (function(){
      var v=document.querySelector('spline-viewer');
      if(!v) return;
      function kill(){
        var sr=v.shadowRoot; if(!sr) return false;
        var logo=sr.querySelector('#logo, a[href*="spline.design"]');
        if(logo){ logo.remove(); return true; }
        return false;
      }
      var tries=0, iv=setInterval(function(){ if(kill()||++tries>80) clearInterval(iv); },80);
      v.addEventListener('load',kill);
      var so=setInterval(function(){
        if(v.shadowRoot){ new MutationObserver(kill).observe(v.shadowRoot,{childList:true,subtree:true}); clearInterval(so); kill(); }
      },80);
    })();
  </script>
  <script>
    (function(){
      var v=document.querySelector('spline-viewer');
      function reveal(){ document.documentElement.classList.add('ready'); }
      if(v){ v.addEventListener('load', reveal); }
      // fallback: never let the text stay hidden if the scene is slow/blocked
      setTimeout(reveal, 2500);
      if(!v) reveal();
    })();
  </script>
  <div class="scrim" aria-hidden="true"></div>

  <header class="chrome">
    <a class="logo" href="#">Datessa</a>
  </header>

  <main class="hero">
    <h1>From access to understanding.</h1>
    <h2>Your AI can reach your tools. We help it understand them.</h2>

    <button class="cta" id="join-btn" type="button">Join the waitlist</button>

    <div class="wl" id="wl" hidden>
      <form id="wl-form" novalidate>
        <input id="wl-email" type="email" name="email" autocomplete="email" placeholder="you@company.com" aria-label="Work email" required />
        <button type="submit">Join</button>
      </form>
      <p class="err" id="wl-err" hidden></p>
    </div>

    <div class="wl-done" id="wl-done" hidden>
      <div class="t">You’re on the list.</div>
      <div class="s">We’ll email you once — when there’s something to show.</div>
    </div>
  </main>

  <script>
    (function(){
      // ── Google Sheet endpoint ──────────────────────────────────────────
      // Paste your Google Apps Script Web App URL here (see README for setup):
      var ENDPOINT = ""; // e.g. "https://script.google.com/macros/s/XXXX/exec"

      var btn=document.getElementById("join-btn");
      var wl=document.getElementById("wl");
      var form=document.getElementById("wl-form");
      var email=document.getElementById("wl-email");
      var err=document.getElementById("wl-err");
      var done=document.getElementById("wl-done");
      var submitBtn=form.querySelector('button[type="submit"]');

      btn.addEventListener("click",function(){
        btn.hidden=true; wl.hidden=false; email.focus();
      });
      email.addEventListener("input",function(){ err.hidden=true; });

      form.addEventListener("submit",function(e){
        e.preventDefault();
        var val=email.value.trim();
        if(!val||!email.checkValidity()){
          err.textContent="Enter a valid email."; err.hidden=false; email.focus(); return;
        }
        function ok(){ wl.hidden=true; done.hidden=false; }
        if(ENDPOINT){
          submitBtn.disabled=true; submitBtn.textContent="…";
          // Apps Script web apps don't send CORS headers, so use no-cors:
          // the row is written; we just can't read the response.
          fetch(ENDPOINT,{
            method:"POST", mode:"no-cors",
            headers:{"Content-Type":"text/plain;charset=utf-8"},
            body:JSON.stringify({ email: val, ts: new Date().toISOString(), source: location.href })
          }).then(function(){ ok(); })
            .catch(function(){ err.textContent="Network error — try again."; err.hidden=false; submitBtn.disabled=false; submitBtn.textContent="Join"; });
        } else { ok(); /* no endpoint yet: shows success, not yet stored */ }
      });
    })();
  </script>

</body>
</html>
